# SuperQ Personas Configuration

## All_Personas
SuperQ provides 9 cognitive personas implemented as context hooks:

1. **architect**: Systems thinking approach
   - Architecture planning
   - System design
   - Scalability considerations
   - Pattern recognition
   - `/context hooks add persona-architect`

2. **frontend**: UX-focused development
   - User interface design
   - Accessibility considerations
   - Component architecture
   - Visual design principles
   - `/context hooks add persona-frontend`

3. **backend**: Server systems expertise
   - API development
   - Database optimization
   - Server architecture
   - System integration
   - `/context hooks add persona-backend`

4. **security**: Security-first analysis
   - Threat modeling
   - Vulnerability assessment
   - Security best practices
   - Compliance considerations
   - `/context hooks add persona-security`

5. **analyzer**: Root cause analysis
   - Problem investigation
   - Systematic debugging
   - Evidence-based analysis
   - Performance profiling
   - `/context hooks add persona-analyzer`

6. **qa**: Quality assurance focus
   - Test strategy
   - Coverage analysis
   - Edge case identification
   - Validation techniques
   - `/context hooks add persona-qa`

7. **performance**: Optimization expertise
   - Performance tuning
   - Bottleneck identification
   - Resource optimization
   - Benchmarking
   - `/context hooks add persona-performance`

8. **refactorer**: Code quality focus
   - Code improvement
   - Technical debt reduction
   - Pattern application
   - Maintainability enhancement
   - `/context hooks add persona-refactorer`

9. **mentor**: Knowledge sharing approach
   - Documentation
   - Explanation
   - Learning facilitation
   - Best practice sharing
   - `/context hooks add persona-mentor`

## Collaboration_Patterns
Personas can collaborate through context hooks:

1. **Sequential Collaboration**
   - Apply personas in sequence for complex problems
   - `/context hooks add persona-architect`
   - `/context hooks add persona-security`
   - `/context hooks add persona-performance`

2. **Specialized Collaboration**
   - Apply specific personas for specialized tasks
   - `/context hooks add persona-frontend` for UI development
   - `/context hooks add persona-backend` for API development

3. **Comprehensive Collaboration**
   - Apply multiple personas for holistic solutions
   - `/context hooks add persona-architect` for system design
   - `/context hooks add persona-security` for security review
   - `/context hooks add persona-qa` for quality assurance

4. **Focused Collaboration**
   - Apply single persona for focused expertise
   - `/context hooks add persona-performance` for optimization
   - `/context hooks add persona-refactorer` for code quality

## Intelligent_Activation_Patterns
Personas can be activated intelligently:

1. **Task-Based Activation**
   - Activate personas based on task requirements
   - `/context hooks add persona-frontend` for UI tasks
   - `/context hooks add persona-backend` for API tasks

2. **Problem-Based Activation**
   - Activate personas based on problem characteristics
   - `/context hooks add persona-analyzer` for debugging
   - `/context hooks add persona-security` for security issues

3. **Phase-Based Activation**
   - Activate personas based on development phase
   - `/context hooks add persona-architect` for design phase
   - `/context hooks add persona-qa` for testing phase

4. **Domain-Based Activation**
   - Activate personas based on domain expertise
   - `/context hooks add persona-frontend` for frontend domain
   - `/context hooks add persona-backend` for backend domain


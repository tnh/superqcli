   - `/document` - Knowledge sharing
   - `/review` - Learning facilitation

## Integration_Examples
Personas integrate with commands:

1. **Architecture Design**
   ```
   /context hooks add persona-architect
   /design --api --ddd --bounded-context
   ```

2. **Security Analysis**
   ```
   /context hooks add persona-security
   /scan --security --owasp --deps
   ```

3. **Performance Optimization**
   ```
   /context hooks add persona-performance
   /analyze --profile --perf
   /improve --performance --threshold 95%
   ```

4. **Code Quality**
   ```
   /context hooks add persona-refactorer
   /review --quality --evidence
   /improve --quality --refactor
   ```

## Advanced_Features
Personas include advanced features:

1. **Conversation Start Hooks**
   - Apply personas at conversation start
   - `q chat --context-hooks persona-architect`
   - Persona influences entire conversation

2. **Per Prompt Hooks**
   - Apply personas for specific prompts
   - `/context hooks add persona-security`
   - Persona influences subsequent prompts

3. **Multiple Personas**
   - Apply multiple personas simultaneously
   - `/context hooks add persona-architect persona-security`
   - Combined expertise for complex problems

4. **Temporary Personas**
   - Apply personas temporarily
   - `/context hooks add persona-performance`
   - `/context hooks disable persona-performance`

